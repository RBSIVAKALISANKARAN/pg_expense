<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg-main)',
                        card: 'var(--bg-card)',
                        'text-main': 'var(--text-main)',
                        'text-muted': 'var(--text-muted)',
                        primary: 'var(--accent-primary)',
                        'primary-hover': 'var(--accent-hover)',
                        border: 'var(--border-color)',
                        input: 'var(--input-bg)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-text-main min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative">

    <button id="theme-toggle" class="absolute top-4 right-4 p-2 rounded-lg bg-card border border-border text-text-main hover:bg-input transition z-50">
        <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
        <svg id="theme-toggle-dark-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
    </button>

    <div class="bg-card border border-border p-8 rounded-2xl shadow-xl w-full max-w-md transition-colors duration-300">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-text-muted text-sm">Please enter your details to sign in.</p>
        </div>

        <form action="#" method="POST" class="flex flex-col gap-4">

            <div>
                <label for="email" class="block text-sm font-medium text-text-main mb-1">Email Address</label>
                <input type="email" id="email" name="email" required 
                    class="w-full bg-input border border-border text-text-main px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                    placeholder="expense@gmail.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-text-main mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required 
                        class="w-full bg-input border border-border text-text-main px-4 py-2.5 pr-10 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                        placeholder="••••••••">
                    
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-text-main transition">
                        <svg id="eyeIconPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex justify-end mt-1">
                <a href="#" class="text-sm text-primary hover:text-primary-hover font-medium transition">Forgot password?</a>
            </div>

            <button type="submit" 
                class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 px-4 rounded-lg mt-2 transition duration-200">
                Sign In
            </button>
            
        </form>

        <p class="text-center text-sm text-text-muted mt-6">
            Don't have an account? <a href="register.html" class="text-primary hover:text-primary-hover font-medium transition">Sign up</a>
        </p>

    </div>

    <script src="js/theme.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
